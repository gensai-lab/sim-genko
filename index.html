<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>みんなの減災ラボ - 原稿支援・送出システム v2.5</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=BIZ+UDPGothic:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-main: #222222;
            --bg-sidebar: #121212;
            --color-text: #ffffff;
            --color-orange: #d9531e;
            
            /* 各メニューの背景色 */
            --bg-btn-earthquake: #3d1a04;
            --bg-btn-tsunami: #052c54;
            --bg-btn-eew: #4a0d0d;
            --bg-btn-teikei: #4a3e0d;
            --bg-btn-ctrl: #4a4a4a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "BIZ UDPGothic", "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            background-color: #000;
            color: var(--color-text);
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        /* --- 画面全体の初期選択・スタート画面 --- */
        #setup-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #1a1a1a;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            padding: 40px 20px;
            overflow-y: auto;
            gap: 20px;
        }

        .setup-title {
            font-size: 32px;
            font-weight: bold;
            letter-spacing: 2px;
            color: #fff;
            margin-bottom: 10px;
        }

        .setup-title span {
            color: var(--color-orange);
        }

        .file-mock-btn {
            background-color: #333;
            border: 2px dashed #555;
            padding: 15px 40px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            transition: all 0.2s;
            text-align: center;
            width: 100%;
            max-width: 500px;
        }

        .file-mock-btn:hover {
            background-color: #444;
            border-color: var(--color-orange);
        }

        #file-info {
            font-size: 16px;
            color: #ffdd44;
            font-weight: bold;
            text-align: center;
            max-width: 800px;
            word-break: break-all;
            line-height: 1.4;
        }

        /* タイムラインプレビュー表示エリア */
        #preview-area {
            width: 100%;
            max-width: 800px;
            background-color: #111;
            border: 1px solid #333;
            border-radius: 6px;
            padding: 15px;
            display: none;
            flex-direction: column;
            gap: 8px;
            max-height: 40vh;
            overflow-y: auto;
        }

        .preview-title {
            font-size: 14px;
            color: #888;
            border-bottom: 1px solid #333;
            padding-bottom: 5px;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .preview-row {
            display: flex;
            gap: 15px;
            font-family: monospace;
            font-size: 15px;
            padding: 6px 10px;
            background: #1a1a1a;
            border-radius: 4px;
            border-left: 4px solid #555;
        }
        .preview-row.eew { border-left-color: #ff0000; }
        .preview-row.eq { border-left-color: #d9531e; }
        .preview-row.tnm { border-left-color: #0055ff; }

        .preview-time { color: #888; width: 80px; }
        .preview-trigger { color: #00ffcc; width: 90px; }
        .preview-tag { color: #ffff00; width: 60px; font-weight: bold; }
        .preview-desc { color: #fff; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .start-btn {
            background-color: var(--color-orange);
            color: white;
            border: none;
            padding: 15px 80px;
            font-size: 22px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(217, 83, 30, 0.4);
            transition: all 0.2s;
            margin-top: 10px;
        }

        .start-btn:disabled {
            background-color: #444;
            color: #777;
            box-shadow: none;
            cursor: not-allowed;
        }

        .start-btn:not(:disabled):hover {
            background-color: #f15e22;
            transform: translateY(-2px);
        }

        /* --- メインアプリケーション画面 --- */
        #app-container {
            width: 100%;
            height: 100%;
            display: flex;
            background-color: var(--bg-main);
            position: relative;
        }

        /* 左側サイドバー */
        #sidebar {
            width: 320px;
            background-color: var(--bg-sidebar);
            display: flex;
            flex-direction: column;
            padding: 20px;
            justify-content: space-between;
            border-right: 1px solid #333;
        }

        .brand-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .brand-logo {
            font-size: 22px;
            font-weight: 900;
            letter-spacing: 1px;
        }

        .brand-version {
            font-size: 14px;
            color: #888;
            font-family: monospace;
        }

        .menu-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex: 1;
        }

        .menu-item {
            display: flex;
            align-items: center;
            width: 100%;
            height: 55px;
            border: none;
            border-radius: 4px;
            color: white;
            padding: 0 15px;
            text-align: left;
            position: relative;
            opacity: 0.4;
            transition: opacity 0.2s;
        }

        .menu-item.active {
            opacity: 1;
            box-shadow: inset 0 0 0 3px #fff, 0 0 15px rgba(255,255,255,0.3);
        }

        .menu-item.active::after {
            content: '';
            position: absolute;
            right: -20px;
            top: 50%;
            transform: translateY(-50%);
            border-left: 10px solid var(--color-orange);
            border-top: 10px solid transparent;
            border-bottom: 10px solid transparent;
        }

        .menu-earthquake { background-color: var(--bg-btn-earthquake); }
        .menu-tsunami { background-color: var(--bg-btn-tsunami); }
        .menu-eew { background-color: var(--bg-btn-eew); }
        .menu-teikei { background-color: var(--bg-btn-teikei); }

        .menu-icon {
            font-size: 24px;
            margin-right: 15px;
            width: 35px;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .icon-earthquake::before { content: "⚠️"; }
        .icon-shindo::before { content: "📈"; }
        .icon-tsunami::before { content: "🌊"; }
        .icon-observed::before { content: "∿🌊"; font-size: 18px; }
        .icon-forecast::before { content: "🕒"; }
        .icon-eew::before { content: "🔔"; }
        .icon-teikei::before { content: "🗣️"; }

        .menu-text {
            font-size: 26px;
            font-weight: bold;
            letter-spacing: 4px;
        }

        .sidebar-footer {
            margin-top: 20px;
            font-size: 18px;
            line-height: 1.4;
            font-family: monospace;
            color: #ccc;
        }

        /* 右側メインコンテンツエリア */
        #main-content {
            flex: 1;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
        }

        .content-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .header-indicator {
            width: 10px;
            height: 35px;
            background-color: var(--color-orange);
            border-radius: 2px;
        }

        .content-title {
            font-size: 36px;
            font-weight: bold;
            letter-spacing: 2px;
        }

        .text-display-area {
            flex: 1;
            font-size: 26px;
            line-height: 1.6;
            letter-spacing: 1px;
            white-space: pre-wrap;
            font-weight: bold;
            padding-right: 40px;
            overflow-y: auto;
        }

        /* 警報・震度等のカラーバッジ装飾 */
        .badge {
            padding: 2px 8px;
            border-radius: 3px;
            color: #fff;
            margin: 0 2px;
        }
        .badge-magenta { background-color: #ff00ff; color: #fff; }
        .badge-red { background-color: #ff0000; color: #fff; }
        .badge-yellow { background-color: #ffff00; color: #000; }
        .badge-max-shindo { background-color: #d9531e; color: #fff; }

        /* 右下コントロール */
        .bottom-controls {
            display: flex;
            justify-content: flex-end;
            gap: 15px;
            margin-top: 20px;
        }

        .ctrl-btn {
            background-color: var(--bg-btn-ctrl);
            color: white;
            border: none;
            border-radius: 4px;
            padding: 10px 24px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            min-width: 100px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .btn-arrow {
            font-size: 22px;
            min-width: 60px;
        }

        #debug-timeline-status {
            position: absolute;
            top: 15px;
            right: 40px;
            font-family: monospace;
            font-size: 14px;
            color: #666;
            display: flex;
            gap: 15px;
        }
    </style>
</head>
<body>

    <div id="setup-screen">
        <div class="setup-title">みんなの減災ラボ <span>原稿支援システム</span></div>
        
        <div class="file-mock-btn" onclick="document.getElementById('log-file-input').click()">
            📁 タイムラインログファイルを選択 (.txt)
        </div>
        <input type="file" id="log-file-input" accept=".txt" style="display: none;" onchange="handleFileSelect(event)">
        
        <div id="file-info">ファイルが選択されていません</div>
        
        <div id="preview-area">
            <div class="preview-title">解析された発表スケジュール一覧 (シミュレーション上のタイムライン)</div>
            <div id="preview-rows-container"></div>
        </div>
        
        <button class="start-btn" id="start-simulation-btn" disabled onclick="startSimulation()">
            シミュレーション開始
        </button>
    </div>

    <div id="app-container">
        
        <div id="sidebar">
            <div>
                <div class="brand-header">
                    <div class="brand-logo">みんなの減災ラボ</div>
                    <div class="brand-version">v2.5</div>
                </div>
                <div class="menu-list">
                    <button class="menu-item menu-earthquake" id="menu-地震">
                        <div class="menu-icon icon-earthquake"></div>
                        <div class="menu-text">地震</div>
                    </button>
                    <button class="menu-item menu-earthquake" id="menu-震度">
                        <div class="menu-icon icon-shindo"></div>
                        <div class="menu-text">震度</div>
                    </button>
                    <button class="menu-item menu-tsunami" id="menu-津波">
                        <div class="menu-icon icon-tsunami"></div>
                        <div class="menu-text">津波</div>
                    </button>
                    <button class="menu-item menu-tsunami" id="menu-観測津波">
                        <div class="menu-icon icon-observed"></div>
                        <div class="menu-text">観測津波</div>
                    </button>
                    <button class="menu-item menu-tsunami" id="menu-到達予想">
                        <div class="menu-icon icon-forecast"></div>
                        <div class="menu-text">到達予想</div>
                    </button>
                    <button class="menu-item menu-eew" id="menu-EEW">
                        <div class="menu-icon icon-eew"></div>
                        <div class="menu-text">EEW</div>
                    </button>
                    <button class="menu-item menu-teikei" id="menu-定型">
                        <div class="menu-icon icon-teikei"></div>
                        <div class="menu-text">定型</div>
                    </button>
                </div>
            </div>
            
            <div class="sidebar-footer" id="live-clock">
                20XX年XX月XX日<br>XX時XX分XX秒
            </div>
        </div>

        <div id="main-content">
            <div id="debug-timeline-status">
                <span id="debug-tag">TAG: NONE</span>
                <span id="debug-time">TIME: 00:00:00</span>
            </div>

            <div>
                <div class="content-header">
                    <div class="header-indicator"></div>
                    <div class="content-title" id="content-title">地震情報</div>
                </div>
                <div class="text-display-area" id="text-display">
                    シミュレーションが開始されると、ここに原稿テキストが自動送出されます。
                </div>
            </div>

            <div class="bottom-controls">
                <button class="ctrl-btn" onclick="togglePausePlay()" id="ui-play-pause-btn">一時停止</button>
                <button class="ctrl-btn" onclick="resetToSetup()">終了</button>
                <button class="ctrl-btn btn-arrow" onclick="navigateEvent(-1)">◀</button>
                <button class="ctrl-btn btn-arrow" onclick="navigateEvent(1)">▶</button>
            </div>
        </div>

    </div>

    <script>
        let timelineEvents = [];
        let elapsedSeconds = 0;
        let timelineTimer = null;
        let isSimulationRunning = false;
        let currentEventIdx = -1;

        function updateLiveClock() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const date = String(now.getDate()).padStart(2, '0');
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('live-clock').innerHTML = `${year}年${month}月${date}日<br>${hours}時${minutes}分${seconds}秒`;
        }
        setInterval(updateLiveClock, 1000);
        updateLiveClock();

        function timeToSeconds(timeStr) {
            const parts = timeStr.split(':');
            if (parts.length === 2) {
                return parseInt(parts[0], 10) * 3600 + parseInt(parts[1], 10) * 60;
            } else if (parts.length === 3) {
                return parseInt(parts[0], 10) * 3600 + parseInt(parts[1], 10) * 60 + parseInt(parts[2], 10);
            }
            return 0;
        }

        function secondsToTimeString(totalSeconds) {
            const h = String(Math.floor(totalSeconds / 3600)).padStart(2, '0');
            const m = String(Math.floor((totalSeconds % 3600) / 60)).padStart(2, '0');
            const s = String(totalSeconds % 60).padStart(2, '0');
            return `${h}:${m}:${s}`;
        }

        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;

            document.getElementById('file-info').innerText = `読み込み中...`;

            const reader = new FileReader();
            reader.onload = function(e) {
                const text = e.target.result;
                const parsed = parseRawTimelineLog(text);
                
                if (parsed && parsed.length > 0) {
                    timelineEvents = parsed;
                    document.getElementById('file-info').innerText = `正常に読み込みました:「${file.name}」 (${timelineEvents.length}個のイベント検出)`;
                    
                    renderPreviewList();
                    document.getElementById('start-simulation-btn').disabled = false;
                } else {
                    document.getElementById('file-info').innerText = `❌ エラー: <timeline>構造、または[start]基準タグが見つかりませんでした。テキスト内の表記（大文字小文字やカッコの形）を確認してください。`;
                    document.getElementById('preview-area').style.display = 'none';
                    document.getElementById('start-simulation-btn').disabled = true;
                }
            };
            reader.readAsText(file);
        }

        function parseRawTimelineLog(fullText) {
            // 改行コードを一律\nにし、タブ文字等も標準化
            const cleanText = fullText.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
            
            // <timeline> ~ </timeline> の中身を確実に切り抜く
            const timelineMatch = cleanText.match(/<timeline>([\s\S]*?)<\/timeline>/i);
            if (!timelineMatch) return null;

            const lines = timelineMatch[1].split('\n');
            let startTimeSeconds = null;
            const schedule = [];

            // 1. タイムラインスケジュールの抽出
            lines.forEach(line => {
                const trimmed = line.trim();
                if (!trimmed) return;

                // 時刻[タグ]の並びを厳密に抽出
                const match = trimmed.match(/^(\d{1,2}:\d{2}(?::\d{2})?)\s*\[\s*([a-zA-Z0-9_\-]+)\s*\]/);
                if (match) {
                    const sec = timeToSeconds(match[1]);
                    const tag = match[2].trim();
                    
                    if (tag.toLowerCase() === 'start') {
                        startTimeSeconds = sec;
                    } else {
                        schedule.push({ tag: tag, absoluteTimeStr: match[1], absoluteSeconds: sec });
                    }
                }
            });

            if (startTimeSeconds === null) return null;

            const finalEvents = [];

            // 2. 抽出したスケジュールに紐づく個別データブロック (<e01>等) を全探索で切り出す
            schedule.forEach(ev => {
                const targetSeconds = ev.absoluteSeconds - startTimeSeconds;
                if (targetSeconds < 0) return; // startより前の過去イベントは無視

                // タグの開始位置 <tag> を検索
                const openTag = `<${ev.tag}>`;
                const startIdx = cleanText.indexOf(openTag);
                if (startIdx === -1) return;

                const contentStart = startIdx + openTag.length;
                
                // 次の有効なブロックタグ(<[a-z])か、ファイル末尾までをコンテンツ領域とする
                let nextBlockIdx = cleanText.length;
                const remainText = cleanText.substring(contentStart);
                const nextTagMatch = remainText.match(/<[a-zA-Z0-9_\-]+>/);
                if (nextTagMatch && nextTagMatch.index !== undefined) {
                    nextBlockIdx = contentStart + nextTagMatch.index;
                }

                const blockContent = cleanText.substring(contentStart, nextBlockIdx).trim();
                const dataFields = {};
                
                // key[value] の解析ロジック
                // 改行や複数の値（pointsの複数行データなど）を維持するため、最短マッチ[^\]]ではなく
                // 次の有効なキー、もしくはブロック終了までを柔軟にキャプチャする形式に強化
                const fieldRegex = /([a-zA-Z0-9_]+)\s*\[([\s\S]*?)\](?=\s*[a-zA-Z0-9_]+\s*\[|\s*$)/g;
                let fieldMatch;
                while ((fieldMatch = fieldRegex.exec(blockContent)) !== null) {
                    dataFields[fieldMatch[1].trim()] = fieldMatch[2].trim();
                }

                // 分類ロジック
                const typeChar = ev.tag.charAt(0).toLowerCase();
                let targetMenu = "地震";
                let displayTitle = "地震情報";

                if (typeChar === 'e') {
                    targetMenu = "EEW";
                    displayTitle = "緊急地震速報（警報）";
                } else if (typeChar === 's') {
                    if (dataFields.genre === '02') {
                        targetMenu = "地震";
                        displayTitle = "地震情報";
                    } else {
                        targetMenu = "震度";
                        displayTitle = "震度速報";
                    }
                } else if (typeChar === 't') {
                    if (dataFields.points && (dataFields.points.includes('午後') || dataFields.points.includes('午前') || dataFields.points.includes('分'))) {
                        targetMenu = "到達予想";
                        displayTitle = "津波到達予想時刻";
                    } else {
                        targetMenu = "津波";
                        displayTitle = "津波警報・注意報";
                    }
                } else if (typeChar === 'k') {
                    targetMenu = "観測津波";
                    displayTitle = "津波観測速報";
                }

                let summaryText = "";
                if (dataFields.hypocenter) summaryText += `震源:${dataFields.hypocenter} `;
                if (dataFields.magnitude) summaryText += `M${dataFields.magnitude} `;
                if (dataFields.max_shindo || dataFields.shindo) summaryText += `最大震度:${dataFields.max_shindo || dataFields.shindo} `;
                if (!summaryText && dataFields.points) summaryText += dataFields.points.substring(0, 30).replace(/\n/g, ' ') + "...";
                if (!summaryText) summaryText = "データブロック格納完了";

                const formattedHtml = buildScriptHtml(ev.tag, dataFields);

                finalEvents.push({
                    tag: ev.tag,
                    absoluteTimeStr: ev.absoluteTimeStr,
                    triggerSeconds: targetSeconds,
                    menu: targetMenu,
                    title: displayTitle,
                    summary: summaryText,
                    html: formattedHtml
                });
            });

            return finalEvents.sort((a, b) => a.triggerSeconds - b.triggerSeconds);
        }

        function buildScriptHtml(tag, fields) {
            let html = "";
            const type = tag.charAt(0).toLowerCase();

            if (type === 'e') {
                html += `【緊急地震速報 警報発表】\n強烈な揺れに警戒してください。\n\n`;
                if (fields.hypocenter) html += `震源地：<span class="badge badge-max-shindo">${fields.hypocenter}</span>\n`;
                if (fields.area) html += `警戒区域：\n${fields.area.replace(/　/g, '、').replace(/[\n\s]+/g, '、')}\n\n`;
                html += `倒れやすい家具から離れてください。身の安全を確保してください。`;
            }
            else if (type === 's') {
                const isFinal = (fields.genre === '02');
                if (isFinal) {
                    html += `【地震情報 確定報】\n`;
                    html += `地震の詳しい情報です。\n`;
                    html += `震源地：${fields.hypocenter}\n`;
                    if (fields.depth) html += `深さ：約${fields.depth}　`;
                    if (fields.magnitude) html += `規模：マグニチュード ${fields.magnitude}`;
                    html += `\n`;
                } else {
                    html += `【震度速報】\n先ほど、強い地震がありました。\n`;
                }

                if (fields.points) {
                    html += `\n各地の震度情報は以下の通りです。\n`;
                    let pts = fields.points.trim();
                    pts = pts.replace(/7\[/g, '<span class="badge badge-max-shindo">震度７</span>\n　')
                             .replace(/6\+\[/g, '<span class="badge badge-magenta">震度６強</span>\n　')
                             .replace(/6-\[/g, '<span class="badge badge-magenta">震度６弱</span>\n　')
                             .replace(/5\+\[/g, '<span class="badge badge-red">震度５強</span>\n　')
                             .replace(/5-\[/g, '<span class="badge badge-red">震度５弱</span>\n　')
                             .replace(/4\[/g, '<span class="badge badge-yellow" style="color:#000;">震度４</span>\n　')
                             .replace(/\]/g, '\n');
                    html += pts;
                }
            }
            else if (type === 't') {
                html += `【津波警報・注意報】\nただちに海岸や河口付近から離れ、高い場所へ避難してください！\n\n`;
                if (fields.points) {
                    let pts = fields.points.trim();
                    pts = pts.replace(/\[大津波警報\]/g, ' 🚨<span class="badge badge-magenta">大津波警報</span>')
                             .replace(/\[津波警報\]/g, ' 🔴<span class="badge badge-red">津波警報</span>')
                             .replace(/\[津波注意報\]/g, ' 🟡<span class="badge badge-yellow">津波注意報</span>')
                             .replace(/\[/g, ' (')
                             .replace(/\]/g, ')\n');
                    html += pts;
                }
            }
            else if (type === 'k') {
                html += `【津波の観測速報】\n沿岸で実際に観測されている津波の高さです。\n\n`;
                if (fields.points) {
                    let pts = fields.points.trim();
                    pts = pts.replace(/\[/g, ' → 【').replace(/\]/g, '】\n');
                    html += pts;
                }
            }

            html = html.replace(/⬆︎/g, '🔺(上昇中)');
            return html;
        }

        function renderPreviewList() {
            const container = document.getElementById('preview-rows-container');
            container.innerHTML = ""; 

            timelineEvents.forEach(ev => {
                const row = document.createElement('div');
                
                let typeClass = "eq";
                if(ev.tag.charAt(0).toLowerCase() === 'e') typeClass = "eew";
                if(ev.tag.charAt(0).toLowerCase() === 't' || ev.tag.charAt(0).toLowerCase() === 'k') typeClass = "tnm";
                
                row.className = `preview-row ${typeClass}`;

                row.innerHTML = `
                    <div class="preview-time">⏱ ${ev.absoluteTimeStr}</div>
                    <div class="preview-trigger">(開始 ${ev.triggerSeconds}秒後)</div>
                    <div class="preview-tag">[${ev.tag}]</div>
                    <div class="preview-desc">【${ev.menu}】${ev.summary}</div>
                `;
                container.appendChild(row);
            });

            document.getElementById('preview-area').style.display = 'flex';
        }

        function syncSimulationFrame(seconds) {
            document.getElementById('debug-time').innerText = `TIME: ${secondsToTimeString(seconds)}`;

            let targetIdx = -1;
            for (let i = 0; i < timelineEvents.length; i++) {
                if (timelineEvents[i].triggerSeconds <= seconds) {
                    targetIdx = i;
                } else {
                    break;
                }
            }

            if (targetIdx !== -1 && targetIdx !== currentEventIdx) {
                currentEventIdx = targetIdx;
                const ev = timelineEvents[currentEventIdx];

                document.getElementById('debug-tag').innerText = `TAG: ${ev.tag} (${ev.triggerSeconds}s)`;
                document.getElementById('content-title').innerText = ev.title;
                document.getElementById('text-display').innerHTML = ev.html;

                document.querySelectorAll('.menu-item').forEach(btn => btn.classList.remove('active'));
                const activeBtn = document.getElementById(`menu-${ev.menu}`);
                if (activeBtn) {
                    activeBtn.classList.add('active');
                }
            }
        }

        function simulationTick() {
            elapsedSeconds++;
            syncSimulationFrame(elapsedSeconds);
        }

        function startSimulation() {
            if (timelineEvents.length === 0) return;
            
            elapsedSeconds = 0;
            currentEventIdx = -1;
            isSimulationRunning = true;

            document.getElementById('setup-screen').style.display = 'none';
            syncSimulationFrame(0);

            document.getElementById('ui-play-pause-btn').innerText = "一時停止";
            timelineTimer = setInterval(simulationTick, 1000);
        }

        function togglePausePlay() {
            if (!isSimulationRunning) return;

            const btn = document.getElementById('ui-play-pause-btn');
            if (timelineTimer) {
                clearInterval(timelineTimer);
                timelineTimer = null;
                btn.innerText = "再生";
            } else {
                timelineTimer = setInterval(simulationTick, 1000);
                btn.innerText = "一時停止";
            }
        }

        function resetToSetup() {
            if (timelineTimer) {
                clearInterval(timelineTimer);
                timelineTimer = null;
            }
            isSimulationRunning = false;
            document.getElementById('setup-screen').style.display = 'flex';
        }

        function navigateEvent(direction) {
            if (timelineEvents.length === 0) return;

            let nextIdx = currentEventIdx + direction;
            if (nextIdx < 0) nextIdx = 0;
            if (nextIdx >= timelineEvents.length) nextIdx = timelineEvents.length - 1;

            elapsedSeconds = timelineEvents[nextIdx].triggerSeconds;
            syncSimulationFrame(elapsedSeconds);
        }

        window.addEventListener('keydown', function(e) {
            if (!isSimulationRunning) return;
            
            if (e.code === 'Space') {
                e.preventDefault();
                togglePausePlay();
            } else if (e.code === 'ArrowRight') {
                e.preventDefault();
                navigateEvent(1);
            } else if (e.code === 'ArrowLeft') {
                e.preventDefault();
                navigateEvent(-1);
            }
        });
    </script>
</body>
</html>
