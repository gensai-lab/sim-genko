<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>

            right: -20px;

        .menu-earthquake { background-color: var(--bg-btn-earthquake); }

        .menu-teikei { background-color: var(--bg-btn-teikei); }

        .menu-icon {

            margin-right: 15px;

        .icon-alert::before { content: "⚠️"; }

        .icon-tsunami::before { content: "🌊"; }
        .icon-observed::before { content: "∿🌊"; font-size: 18px; }
        .icon-clock::before { content: "🕒"; }
        .icon-bell::before { content: "🔔"; }
        .icon-voice::before { content: "🗣️"; }

        .menu-text {
            font-size: 26px;
            font-weight: bold;
            letter-spacing: 4px;
        }

        .sidebar-footer {
            margin-top: 20px;
            font-size: 18px;
            line-height: 1.4;
            font-family: monospace;
            color: #ccc;
        }

        /* 右側メインコンテンツエリア */
        #main-content {
            flex: 1;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
        }

        .content-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .header-indicator {
            width: 10px;
            height: 35px;
            background-color: var(--color-orange);
            border-radius: 2px;

        .content-title {

            font-weight: bold;

        .text-display-area {

            font-size: 26px;
            line-height: 1.6;

        /* 警報色ハイライト設定 */
        .bg-magenta {

            color: #fff;

            margin: 0 2px;

        .bg-red {

            color: #fff;

            margin: 0 2px;

        }

        .bg-yellow {

            padding: 0 6px;
            margin: 0 2px;

            border-radius: 4px;

        }

        .btn-arrow {

</head>
<body>

    <!-- 運用コントロールパネル -->
    <div id="system-control">
        <button class="sys-btn" onclick="document.getElementById('file-input').click()">📁 タイムラインログ読込</button>
        <input type="file" id="file-input" accept=".txt" onchange="loadLogFile(event)">
        
        <button class="sys-btn" id="play-btn" onclick="togglePlay()">▶ 再生</button>
        <button class="sys-btn" onclick="stopTimeline()">■ 停止</button>
        
        <div style="margin-left: auto; display: flex; align-items: center; gap: 15px;">
            <span id="current-tag-display" style="font-size: 14px; color: #aaa; font-family: monospace;">TAG: NONE</span>
            <span>経過時間:</span>
            <div class="time-display" id="timeline-clock">00:00:00</div>
        </div>
    </div>

    <!-- メインアプリケーション -->
    <div id="app-container">
        
        <!-- 左サイドバー -->
        <div id="sidebar">
            <div>
                <div class="brand-header">
                    <div class="brand-logo">みんなの減災ラボ</div>
                    <div class="brand-version">v2.0</div>
                </div>
                <div class="menu-list">
                    <button class="menu-item menu-earthquake" id="menu-地震">
                        <div class="menu-icon icon-alert"></div>
                        <div class="menu-text">地震</div>
                    </button>
                    <button class="menu-item menu-earthquake" id="menu-震度">
                        <div class="menu-icon icon-wave-line"></div>
                        <div class="menu-text">震度</div>
                    </button>
                    <button class="menu-item menu-tsunami" id="menu-津波">
                        <div class="menu-icon icon-tsunami"></div>
                        <div class="menu-text">津波</div>
                    </button>
                    <button class="menu-item menu-tsunami" id="menu-観測津波">
                        <div class="menu-icon icon-observed"></div>
                        <div class="menu-text">観測津波</div>
                    </button>
                    <button class="menu-item menu-tsunami" id="menu-到達予想">
                        <div class="menu-icon icon-clock"></div>
                        <div class="menu-text">到達予想</div>
                    </button>
                    <button class="menu-item menu-eew" id="menu-EEW">
                        <div class="menu-icon icon-bell"></div>
                        <div class="menu-text">EEW</div>
                    </button>
                    <button class="menu-item menu-teikei" id="menu-定型">
                        <div class="menu-icon icon-voice"></div>
                        <div class="menu-text">定型</div>
                    </button>
                </div>
            </div>
            
            <div class="sidebar-footer" id="live-clock">
                20XX年XX月XX日<br>XX時XX分XX秒
            </div>
        </div>

        <!-- 右メイン画面 -->
        <div id="main-content">
            <div>
                <div class="content-header">
                    <div class="header-indicator"></div>
                    <div class="content-title" id="content-title">待機中</div>
                </div>
                <div class="text-display-area" id="text-display">
上の「タイムラインログ読込」ボタンから、作成したログテキストファイルを選択してください。
タイムラインの構成に従って自動で原稿化・送出が行われます。
                </div>
            </div>

            <div class="bottom-controls">
                <button class="ctrl-btn">呼びかけ</button>
                <button class="ctrl-btn">地震切替</button>
                <button class="ctrl-btn btn-arrow" onclick="navigateScenario(-1)">◀</button>
                <button class="ctrl-btn btn-arrow" onclick="navigateScenario(1)">▶</button>
            </div>
        </div>

    </div>

    <script>
        let scenarioEvents = [];
        let currentSeconds = 0;
        let timerInterval = null;
        let isPlaying = false;
        let currentIdx = -1;

        // 右下の時計 (現実時間)
        function updateLiveClock() {
            const now = new Date();
            document.getElementById('live-clock').innerHTML = 
                `${now.getFullYear()}年${String(now.getMonth() + 1).padStart(2,'0')}月${String(now.getDate()).padStart(2,'0')}日<br>` +
                `${String(now.getHours()).padStart(2,'0')}時${String(now.getMinutes()).padStart(2,'0')}分${String(now.getSeconds()).padStart(2,'0')}秒`;
        }
        setInterval(updateLiveClock, 1000);
        updateLiveClock();

        // 経過秒数を hh:mm:ss に変換
        function formatHHMMSS(totalSec) {
            const h = String(Math.floor(totalSec / 3600)).padStart(2, '0');
            const m = String(Math.floor((totalSec % 3600) / 60)).padStart(2, '0');
            const s = String(totalSec % 60).padStart(2, '0');
            return `${h}:${m}:${s}`;
        }

        // タイムラインログの独自パース処理
        function parseRawLog(text) {
            const timelineMatch = text.match(/<timeline>([\s\S]*?)<\/timeline>/);
            if (!timelineMatch) return [];

            const lines = timelineMatch[1].trim().split('\n');
            let startTimeInSec = null;
            const tempEvents = [];

            lines.forEach(line => {
                const m = line.match(/(\d{2}):(\d{2}):(\d{2})\[(.*?)\]/);
                if (m) {
                    const sec = parseInt(m[1])*3600 + parseInt(m[2])*60 + parseInt(m[3]);
                    const tag = m[4].trim();
                    if (tag === 'start') {
                        startTimeInSec = sec;
                    } else {
                        tempEvents.push({ tag: tag, absSec: sec });
                    }
                }
            });

            if (startTimeInSec === null) return [];

            const parsedEvents = [];
            tempEvents.forEach(ev => {
                ev.seconds = ev.absSec - startTimeInSec;
                if (ev.seconds < 0) return; 

                // タグデータの抽出 (<tag>ブロック)
                const escapedTag = ev.tag.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                const reg = new RegExp('<' + escapedTag + '>([\\s\\S]*?)(?=<[a-z0-9]+>|$)', 'i');
                const contentMatch = text.match(reg);

                if (contentMatch) {
                    ev.data = parseDataFields(contentMatch[1].trim());
                    ev.script = generateScript(ev.tag, ev.data);
                    parsedEvents.push(ev);
                }
            });

            return parsedEvents.sort((a, b) => a.seconds - b.seconds);
        }

        // タグ内の個別フィールド分解
        function parseDataFields(blockText) {
            const fields = {};
            const regex = /([a-z]+)\[([\s\S]*?)\]/g;
            let match;
            while ((match = regex.exec(blockText)) !== null) {
                fields[match[1]] = match[2].trim();
            }
            return fields;
        }

        // ログ情報から自動的にNHK風のアナウンス原稿とUI設定を生成
        function generateScript(tag, data) {
            let menu = "地震";
            let title = "地震情報";
            let text = "";

            const type = tag.charAt(0); // e, s, t, k

            if (type === 'e') {
                menu = "EEW";
                title = "緊急地震速報 (警報)";
                text = `【緊急地震速報】\n震源は ${data.hypocenter} です。\n次の地域では、強い揺れに警戒してください。\n\n警戒地域：\n${data.area.replace(/　/g, '、')}`;
            } 
            else if (type === 's') {
                const isFinal = (data.genre === '02');
                menu = isFinal ? "地震" : "震度";
                title = isFinal ? "地震情報 (震源・震度確定)" : "震度速報";
                
                let pointsStr = data.points ? data.points.replace(/\t/g, '').trim() : "";
                // 読みやすく改行を整形
                pointsStr = pointsStr.replace(/(\d\+?|[-ー])\[/g, '\n■ 震度$1：\n　').replace(/\]/g, '');

                text = `【震度速報】\n${data.time ? data.time : '先ほど'}、強い地震がありました。\n`;
                if (isFinal) {
                    text += `震源地は ${data.hypocenter}、深さは ${data.depth}、規模を示すマグニチュードは ${data.magnitude} と発表されました。\n`;
                }
                text += `\n各地の震度は以下の通りです。\n${pointsStr}`;
            } 
            else if (type === 't') {
                menu = "津波";
                title = "津波情報";
                
                let pointsStr = data.points ? data.points.replace(/\t/g, '').trim() : "";
                // 大津波警報などのキーワードを強調表示用タグへ一括置換
                pointsStr = pointsStr
                    .replace(/\[大津波警報\]/g, ' 【大津波警報】')
                    .replace(/\[津波警報\]/g, ' 【津波警報】')
                    .replace(/\[津波注意報\]/g, ' 【津波注意報】')
                    .replace(/\[/g, ' (')
                    .replace(/\]/g, ')');

                text = `【津波情報】\n現在、各地の沿岸に津波警報・注意報が発表されています。\n\n${pointsStr}`;
            } 
            else if (type === 'k') {
                menu = "観測津波";
                title = "津波観測情報";
                
                let pointsStr = data.points ? data.points.replace(/\t/g, '').trim() : "";
                pointsStr = pointsStr.replace(/\[/g, ' (').replace(/\]/g, ')');

                text = `【津波の観測速報】\n沿岸で実際に観測された津波の高さです。\n\n${pointsStr}`;
            }

            // 特殊タグを装飾用HTMLに置換
            text = text.replace(/【大津波警報】/g, '<span class="bg-magenta">大津波警報</span>');
            text = text.replace(/【津波警報】/g, '<span class="bg-red">津波警報</span>');
            text = text.replace(/【津波注意報】/g, '<span class="bg-yellow">津波注意報</span>');

            return { menu, title, text };
        }

        // ファイルロード
        function loadLogFile(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                scenarioEvents = parseRawLog(e.target.result);
                stopTimeline();
                if (scenarioEvents.length > 0) {
                    document.getElementById('text-display').innerHTML = `ログファイルを正常にパースしました。(総イベント数: ${scenarioEvents.length}個)\n再生ボタンを押すと、16:07:06を基準としたシミュレーション送出が始まります。`;
                } else {
                    document.getElementById('text-display').innerText = "ログのパースに失敗しました。タイムライン形式およびI encountered an error doing what you asked. Could you try again?
